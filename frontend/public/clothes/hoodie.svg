<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="56" fill="url(#bg)"/>
  <!-- Hood -->
  <ellipse cx="256" cy="148" rx="90" ry="68" fill="url(#hood)"/>
  <!-- Hood opening -->
  <ellipse cx="256" cy="158" rx="52" ry="42" fill="#0f0e1a"/>
  <!-- Hoodie body -->
  <path d="M110 220 C90 230 70 280 72 380 L440 380 C442 280 422 230 402 220 C370 210 320 205 300 200 L256 260 L212 200 C192 205 142 210 110 220Z" fill="url(#body)"/>
  <!-- Left sleeve -->
  <path d="M110 220 C80 240 60 290 55 340 L115 360 C120 310 130 270 150 248Z" fill="#3730a3"/>
  <!-- Right sleeve -->
  <path d="M402 220 C432 240 452 290 457 340 L397 360 C392 310 382 270 362 248Z" fill="#3730a3"/>
  <!-- Pocket pouch -->
  <rect x="186" y="300" width="140" height="60" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Kangaroo pocket divider -->
  <line x1="256" y1="300" x2="256" y2="360" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Zipper line -->
  <line x1="256" y1="200" x2="256" y2="300" stroke="rgba(255,255,255,0.18)" stroke-width="2.5"/>
  <!-- Zipper dots -->
  <circle cx="256" cy="218" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="256" cy="232" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="256" cy="246" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="256" cy="260" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="256" cy="274" r="3" fill="rgba(255,255,255,0.35)"/>
  <!-- Label -->
  <text x="50%" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="rgba(255,255,255,0.7)" letter-spacing="3">HOODIE</text>
</svg>
